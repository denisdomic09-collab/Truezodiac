<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrueZodiac — Legal</title>
<style>
  :root {
    --bg: #ffffff;
    --text: #1a1a1a;
    --muted: #666;
    --accent: #5b3fb5;
    --border: #e5e5e5;
    --card: #f7f7fa;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f1a;
      --text: #f0f0f5;
      --muted: #a8a8b8;
      --accent: #9d7fff;
      --border: #2a2a3a;
      --card: #18182a;
    }
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container {
    max-width: 540px;
    margin: 0 auto;
    padding: 40px 24px;
    text-align: center;
  }
  h1 {
    font-size: 2.4em;
    margin-bottom: 8px;
    color: var(--accent);
  }
  .tagline {
    color: var(--muted);
    margin-bottom: 40px;
  }
  .links {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .link-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    text-decoration: none;
    color: var(--text);
    transition: transform 0.15s ease, border-color 0.15s ease;
    text-align: left;
  }
  .link-card:hover {
    transform: translateY(-2px);
    border-color: var(--accent);
  }
  .link-card h3 {
    margin: 0 0 4px 0;
    color: var(--accent);
  }
  .link-card p {
    margin: 0;
    color: var(--muted);
    font-size: 0.95em;
  }
  .footer {
    margin-top: 40px;
    color: var(--muted);
    font-size: 0.85em;
  }
</style>
</head>
<body>
<div class="container">
  <h1>TrueZodiac</h1>
  <p class="tagline">Real astronomical astrology. 13 zodiac signs.</p>

  <div class="links">
    <a class="link-card" href="privacy-policy.html">
      <h3>Privacy Policy</h3>
      <p>How we handle your data (spoiler: it stays on your device).</p>
    </a>
    <a class="link-card" href="terms-of-service.html">
      <h3>Terms of Service</h3>
      <p>The rules for using the app, including the astrology disclaimer.</p>
    </a>
  </div>

  <p class="footer">Contact: <a href="mailto:deltart369@gmail.com" style="color: var(--accent);">deltart369@gmail.com</a></p>
</div>
</body>
</html>
